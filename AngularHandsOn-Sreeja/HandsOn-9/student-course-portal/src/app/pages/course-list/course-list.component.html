<div style="padding: 2rem;">
  <h2>Available Courses</h2>
  
  <!-- Search with query parameter -->
  <div style="margin: 1rem 0; display: flex; gap: 0.5rem;">
    <input 
      [(ngModel)]="searchTerm" 
      (input)="onSearch()"
      placeholder="Search courses..."
      style="flex: 1; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
    <span *ngIf="searchTerm" style="color: #666; align-self: center;">
      Showing results for: "{{ searchTerm }}"
    </span>
  </div>
  
  <!-- Loading state -->
  <div *ngIf="loading$ | async" style="text-align: center; padding: 2rem;">
    <p style="color: #3498db; font-size: 1.2rem;">Loading courses...</p>
  </div>

  <!-- Error state -->
  <div *ngIf="error$ | async as error" style="background: #f8d7da; color: #721c24; padding: 1rem; border-radius: 4px; margin: 1rem 0;">
    {{ error }}
  </div>
  
  <!-- Course grid -->
  <div *ngIf="!(loading$ | async)" style="margin: 1rem 0;">
    <div *ngIf="(courses$ | async)?.length === 0; else noCourses">
      <p>No courses available.</p>
    </div>
    <ng-template #noCourses>
      <div style="display: grid; gap: 1rem;">
        <app-course-card 
          *ngFor="let course of courses$ | async; let i = index; trackBy: trackByCourseId" 
          [course]="course"
          [enrolledIds]="(enrolledIds$ | async) || []"
          (enrollRequested)="onEnroll($event)"
          (unenrollRequested)="onUnenroll($event)"
          (click)="onCourseClick(course.id)"
          style="cursor: pointer;">
        </app-course-card>
      </div>
    </ng-template>
  </div>

  <p *ngIf="selectedCourseId" style="color: #2ecc71; margin-top: 1rem;">
    Selected course ID: {{ selectedCourseId }}
  </p>

  <!-- Display current URL for debugging -->
  <div style="margin-top: 2rem; padding: 1rem; background: #f8f9fa; border-radius: 4px; font-size: 0.875rem; color: #666;">
    <p><strong>Current URL:</strong> /courses{{ searchTerm ? '?search=' + searchTerm : '' }}</p>
  </div>
</div>
