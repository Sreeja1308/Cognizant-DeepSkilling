<!-- Global Loading Spinner -->
<div *ngIf="loadingService.isLoading$ | async" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999;">
  <div style="background: white; padding: 2rem; border-radius: 8px; text-align: center;">
    <div style="width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
    <p style="margin-top: 1rem;">Loading...</p>
  </div>
</div>

<app-header></app-header>
<router-outlet></router-outlet>

<style>
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
