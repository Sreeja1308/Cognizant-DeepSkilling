<div style="background: #f8f9fa; padding: 1rem; border-radius: 8px; border: 1px solid #ddd; margin: 1rem 0;">
  <h4>Notifications (Component-level Service Demo)</h4>
  <p style="color: #666; font-size: 0.875rem;">This component uses a component-level provider - each instance gets its own NotificationService</p>
  
  <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
    <input 
      [(ngModel)]="message" 
      placeholder="Enter notification message"
      style="flex: 1; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
    <button 
      (click)="sendNotification()"
      style="padding: 0.5rem 1rem; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">
      Send
    </button>
    <button 
      (click)="clearMessages()"
      style="padding: 0.5rem 1rem; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer;">
      Clear
    </button>
  </div>
  
  <div *ngIf="getMessages().length > 0">
    <h5>Messages:</h5>
    <ul style="list-style: none; padding: 0;">
      <li *ngFor="let msg of getMessages()" style="padding: 0.25rem 0; border-bottom: 1px solid #eee;">
        {{ msg }}
      </li>
    </ul>
  </div>
</div>
