<div class="home-container">
  <h1>{{ portalName }}</h1>
  
  <p class="description">
    Welcome to the Student Course Portal. Manage your courses, track your grades,
    and stay updated with your academic progress.
  </p>
  
  <div class="stats-row">
    <div class="stat-item">
      <span class="stat-value">{{ courseCount }}</span>
      <span class="stat-label">Courses Available</span>
    </div>
    <div class="stat-item">
      <span class="stat-value">{{ enrolledCount }}</span>
      <span class="stat-label">Enrolled</span>
    </div>
    <div class="stat-item">
      <span class="stat-value">{{ gpa }}</span>
      <span class="stat-label">GPA</span>
    </div>
  </div>
  
  <div class="actions">
    <button [disabled]="!isPortalActive" (click)="onEnrollClick()">
      Enroll Now
    </button>
    <p *ngIf="message" class="message">{{ message }}</p>
  </div>
  
  <div class="search-section">
    <label for="search">Search Courses:</label>
    <input id="search" [(ngModel)]="searchTerm" placeholder="Type to search...">
    <p class="search-result">Searching for: {{ searchTerm }}</p>
  </div>
</div>
