# Server Configuration - Port 8082 (different from Account 8080 and Loan 8081)
server.port=8082

# Application Name
spring.application.name=greet-service

# Eureka Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Detailed Logging
logging.level.com.cognizant.greet=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot.web.servlet=DEBUG
logging.level.org.springframework.boot.autoconfigure=INFO

# Show all endpoints on startup
logging.level.org.springframework.web.servlet.mvc=DEBUG