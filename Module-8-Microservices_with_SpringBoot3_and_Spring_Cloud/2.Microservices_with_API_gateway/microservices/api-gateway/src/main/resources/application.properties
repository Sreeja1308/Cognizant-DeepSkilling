# Server Configuration
server.port=9090

# Application Name
spring.application.name=api-gateway

# Eureka Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ========================================
# ROUTE CONFIGURATION - Method 1: Manual Routes
# ========================================

# Greet Service Route
spring.cloud.gateway.routes[0].id=greet-service
spring.cloud.gateway.routes[0].uri=lb://GREET-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/greet-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Account Service Route
spring.cloud.gateway.routes[1].id=account-service
spring.cloud.gateway.routes[1].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/account-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Loan Service Route
spring.cloud.gateway.routes[2].id=loan-service
spring.cloud.gateway.routes[2].uri=lb://LOAN-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/loan-service/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# ========================================
# AUTO-DISCOVERY ROUTES - Method 2: Dynamic Routes
# ========================================

# Enable discovery locator for automatic routing
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ========================================
# LOGGING
# ========================================

logging.level.com.cognizant.apigateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator=DEBUG